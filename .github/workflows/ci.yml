name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm test
        env:
          # Provide minimum env so tests requiring it don't blow up.
          # All real secrets stay empty — tests must mock providers.
          WEBHOOK_SECRET: dev-test-secret
          # TEST_ENCRYPTION_KEY repo secret must be a base64-encoded 32-byte key.
          # Generate with:
          #   node -e "console.log(require('crypto').randomBytes(32).toString('base64'))"
          # then set it under repo Settings → Secrets and variables → Actions.
          CHANNEL_CONFIG_ENCRYPTION_KEY: ${{ secrets.TEST_ENCRYPTION_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: https://test.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon
          SUPABASE_SERVICE_ROLE_KEY: test-service

      - name: Build
        run: npm run build
        env:
          # Same minimum env. Build does not call any external service.
          WEBHOOK_SECRET: dev-test-secret
          CHANNEL_CONFIG_ENCRYPTION_KEY: ${{ secrets.TEST_ENCRYPTION_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: https://test.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon
          SUPABASE_SERVICE_ROLE_KEY: test-service
          SUPABASE_EXPECTED_PROJECT_REF: test
